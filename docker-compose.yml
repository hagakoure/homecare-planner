services:
  postgres:
    image: postgres:16-alpine
    container_name: homecare-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: homecare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - homecare-net

  # ASP.NET Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: homecare-backend
    ports:
      - "5282:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=homecare;Username=postgres;Password=postgres123
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - homecare-net
    restart: unless-stopped

  # React Frontend (опционально — можно запускать локально)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: homecare-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8080  # для общения внутри docker network
    depends_on:
      - backend
    networks:
      - homecare-net
    restart: unless-stopped

networks:
  homecare-net:
    driver: bridge

volumes:
  postgres_data: